<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagewise</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>Pagewise</h1>
      <div role="status" aria-live="polite" id="status-region" data-empty="true"></div>
    </header>
    <main id="panel-main">
      <p id="empty-state">
        Press <strong>Get orientation</strong> to scan the current tab.
        Pagewise will list the page's headings, landmarks, forms, and
        primary actions, with jump buttons that move screen-reader focus
        to the host page.
      </p>
      <button id="extract-btn" type="button">Get orientation</button>

      <section id="result" hidden aria-labelledby="result-heading">
        <h2 id="result-heading" tabindex="-1">Page orientation</h2>

        <dl id="page-meta"></dl>

        <h3>Counts</h3>
        <dl id="page-counts"></dl>

        <h3>Jump to</h3>
        <ul id="jump-list" aria-label="Jump targets"></ul>
      </section>
    </main>
    <footer>
      <p>Phase 0 — deterministic only. AI Orientation comes next.</p>
    </footer>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
